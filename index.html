<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoostMe</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    padding: 60px 20px;
}

h1 {
    font-size: 40px;
}

p {
    font-size: 18px;
    opacity: 0.8;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0099cc;
}

.features {
    margin-top: 50px;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 10px;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 BoostMe</h1>
    <p>أفضل العروض والتحميلات بسرعة فائقة</p>

    <button onclick="alert('سيتم إضافة الرابط لاحقاً')">
        تحميل الآن
    </button>

    <div class="features">
        <div class="card">⚡ سرعة تحميل عالية</div>
        <div class="card">🔥 عروض حصرية</div>
        <div class="card">📱 متوافق مع الهاتف</div>
    </div>
</div>

</body>
</html>
