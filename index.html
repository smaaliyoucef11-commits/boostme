<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoostMe</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    padding: 60px 20px;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    color: white;
    cursor: pointer;
}

#countdown {
    margin-top: 20px;
    font-size: 20px;
    display: none;
}

#downloadLink {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: #00ffcc;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 BoostMe</h1>
    <p>تحميل تطبيق تجريبي</p>

    <button onclick="startDownload()">تحميل الآن</button>

    <div id="countdown">جاري التحضير... 5</div>

    <a id="downloadLink" download="BoostMe.txt">اضغط هنا للتحميل</a>
</div>

<script>
function startDownload() {
    let time = 5;
    document.getElementById("countdown").style.display = "block";

    let interval = setInterval(() => {
        time--;
        document.getElementById("countdown").innerText = "جاري التحضير... " + time;

        if (time === 0) {
            clearInterval(interval);
            document.getElementById("countdown").innerText = "✅ جاهز للتحميل";

            let fileContent = "هذا ملف تجريبي من موقع BoostMe";
            let blob = new Blob([fileContent], { type: "text/plain" });
            let url = URL.createObjectURL(blob);

            let link = document.getElementById("downloadLink");
            link.href = url;
            link.style.display = "block";
        }
    }, 1000);
}
</script>

</body>
</html>
