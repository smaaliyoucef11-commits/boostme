<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BoostMe - تحميل سريع</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    max-width: 400px;
    margin: auto;
}

h1 {
    font-size: 32px;
}

p {
    opacity: 0.8;
}

button {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    font-size: 18px;
    background: #00c3ff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #0099cc;
}
</style>

</head>

<body>

<div class="container">
    <h1>🚀 BoostMe</h1>
    <p>احصل على أفضل العروض والتحميلات بسرعة</p>

    <button onclick="goLink()">تحميل الآن</button>
</div>

<script>
function goLink() {
    window.location.href = "https://example.com";
}
</script>

</body>
</html>
